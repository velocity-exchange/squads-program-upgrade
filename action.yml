name: "Squads program upgrade"
description: "Propose a Solana program (and Anchor 1.0 IDL) upgrade through a Squads multisig"
author: "Helium"
branding:
  icon: "upload"
  color: "red"
inputs:
  network-url:
    description: "The Solana RPC URL"
    required: true
    default: "devnet"
  program-multisig:
    description: "The Squads multisig PDA"
    required: true
  program-id:
    description: "The program id to upgrade"
    required: true
  buffer:
    description: "Program buffer account (already authority-transferred to the multisig vault)"
    required: true
  spill-address:
    description: "Address that receives reclaimed buffer rent"
    required: true
  authority:
    description: "Upgrade authority (the Squads vault PDA)"
    required: true
  name:
    description: "Squads transaction memo"
    required: true
  idl-buffer:
    description: "IDL buffer (program-metadata-program buffer account, authority = vault). Omit to skip IDL update."
    required: false
  keypair:
    description: "Proposer keypair (base58, JSON array, or path to keypair file) — must be a multisig member with Voter permissions"
    required: true
runs:
  using: "node20"
  main: "dist/index.js"
